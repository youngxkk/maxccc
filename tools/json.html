<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化与校验 - ToolKit.Max | 在线 JSON 格式化工具</title>
    <meta name="description" content="ToolKit.Max JSON 格式化与校验工具，支持 JSON 格式化、压缩、校验、美化。实时语法检查，一键复制，支持深色模式。">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['selector', '[data-theme="dark"]'],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        [data-theme='dark'] {
            --bg-color: #020617;
            --text-color: #f1f5f9;
            --card-bg: #1e293b;
            --nav-bg: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass {
            background: var(--nav-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .glass {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .tool-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        textarea {
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            resize: none;
        }

        .json-key {
            color: #0369a1;
        }

        [data-theme='dark'] .json-key {
            color: #7dd3fc;
        }

        .json-string {
            color: #15803d;
        }

        [data-theme='dark'] .json-string {
            color: #86efac;
        }

        .json-number {
            color: #9333ea;
        }

        [data-theme='dark'] .json-number {
            color: #c084fc;
        }

        .json-boolean {
            color: #ea580c;
        }

        [data-theme='dark'] .json-boolean {
            color: #fb923c;
        }

        .json-null {
            color: #dc2626;
        }

        [data-theme='dark'] .json-null {
            color: #f87171;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>,
            AlertCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>,
            CheckCircle: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /></svg>,
            Minimize: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3" /></svg>,
            Maximize: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3" /></svg>
        };

        const translations = {
            'zh-CN': {
                title: 'JSON 格式化与校验',
                desc: '在线格式化、校验和美化 JSON 数据',
                input_placeholder: '在此粘贴或输入 JSON 数据...',
                format: '格式化',
                minify: '压缩',
                clear: '清空',
                copy: '复制',
                copied: '已复制',
                valid: 'JSON 格式正确',
                invalid: 'JSON 格式错误',
                input_label: '输入',
                output_label: '输出',
                error_label: '错误信息',
                more_tools: '更多工具',
                pwd: '密码生成',
                units: '单位换算',
                lorem: '随机文本',
                words: '字数统计',
                text: '文本转换',
                bmi: '健康计算',
                gradient: 'CSS 渐变',
                json: 'JSON 格式化'
            },
            'en': {
                title: 'JSON Formatter & Validator',
                desc: 'Format, validate and beautify JSON data online',
                input_placeholder: 'Paste or type JSON data here...',
                format: 'Format',
                minify: 'Minify',
                clear: 'Clear',
                copy: 'Copy',
                copied: 'Copied',
                valid: 'Valid JSON',
                invalid: 'Invalid JSON',
                input_label: 'Input',
                output_label: 'Output',
                error_label: 'Error',
                more_tools: 'More Tools',
                pwd: 'Password',
                units: 'Units',
                lorem: 'Lorem Ipsum',
                words: 'Word Count',
                text: 'Text Convert',
                bmi: 'BMI Calc',
                gradient: 'CSS Gradient',
                json: 'JSON Format'
            }
        };

        const App = () => {
            const [lang, setLang] = useState(localStorage.getItem('lang') || 'zh-CN');
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'light');
            const [input, setInput] = useState('');
            const [output, setOutput] = useState('');
            const [error, setError] = useState('');
            const [isValid, setIsValid] = useState(null);
            const [copied, setCopied] = useState(false);

            const t = translations[lang];

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            }, [theme]);

            useEffect(() => {
                localStorage.setItem('lang', lang);
            }, [lang]);

            const validateAndFormat = (text, shouldMinify = false) => {
                if (!text.trim()) {
                    setOutput('');
                    setError('');
                    setIsValid(null);
                    return;
                }

                try {
                    const parsed = JSON.parse(text);
                    const formatted = shouldMinify
                        ? JSON.stringify(parsed)
                        : JSON.stringify(parsed, null, 2);

                    setOutput(formatted);
                    setError('');
                    setIsValid(true);
                } catch (e) {
                    setOutput('');
                    setError(e.message);
                    setIsValid(false);
                }
            };

            const handleFormat = () => {
                validateAndFormat(input, false);
            };

            const handleMinify = () => {
                validateAndFormat(input, true);
            };

            const handleClear = () => {
                setInput('');
                setOutput('');
                setError('');
                setIsValid(null);
            };

            const handleCopy = () => {
                if (output) {
                    navigator.clipboard.writeText(output);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                }
            };

            const handleInputChange = (e) => {
                const value = e.target.value;
                setInput(value);

                // Auto-validate as user types
                if (value.trim()) {
                    try {
                        JSON.parse(value);
                        setIsValid(true);
                        setError('');
                    } catch (e) {
                        setIsValid(false);
                        setError(e.message);
                    }
                } else {
                    setIsValid(null);
                    setError('');
                }
            };

            return (
                <div className="min-h-screen flex flex-col transition-all duration-300">
                    <nav className="glass sticky top-0 z-50 px-6 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-bold text-xl tracking-tight">
                            <span className="text-2xl">📋</span>
                            <span className="dark:text-white">ToolKit<span className="text-blue-600">.Max</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setLang(lang === 'en' ? 'zh-CN' : 'en')} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors dark:text-gray-300">
                                <Icons.Globe />
                            </button>
                            <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors dark:text-gray-300">
                                {theme === 'light' ? <Icons.Moon /> : <Icons.Sun />}
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 max-w-7xl mx-auto w-full px-6 py-12 md:py-20 animate-up">
                        <header className="text-center mb-10">
                            <h1 className="text-4xl md:text-5xl font-bold mb-4 tracking-tight dark:text-white">{t.title}</h1>
                            <p className="text-gray-500 dark:text-gray-400 text-lg">{t.desc}</p>
                        </header>

                        <div className="space-y-6">
                            {/* Status Bar - Fixed Height */}
                            <div className={`tool-card p-4 rounded-2xl card-shadow min-h-[72px] flex items-start gap-3 transition-all duration-300 ${isValid === true
                                ? 'bg-green-50 dark:bg-green-950/20 border-green-200 dark:border-green-900'
                                : isValid === false
                                    ? 'bg-red-50 dark:bg-red-950/20 border-red-200 dark:border-red-900'
                                    : 'bg-gray-50 dark:bg-gray-950/20 border-gray-200 dark:border-gray-800'
                                }`}>
                                {isValid === true ? (
                                    <>
                                        <div className="text-green-600 dark:text-green-400 mt-0.5">
                                            <Icons.CheckCircle />
                                        </div>
                                        <span className="font-semibold text-green-700 dark:text-green-300">{t.valid}</span>
                                    </>
                                ) : isValid === false ? (
                                    <>
                                        <div className="text-red-600 dark:text-red-400 mt-0.5 flex-shrink-0">
                                            <Icons.AlertCircle />
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="font-semibold text-red-700 dark:text-red-300 mb-1">{t.invalid}</div>
                                            {error && (
                                                <div className="text-sm text-red-600 dark:text-red-400 break-words">
                                                    {error}
                                                </div>
                                            )}
                                        </div>
                                    </>
                                ) : (
                                    <div className="flex-1 text-center">
                                        <span className="text-gray-500 dark:text-gray-400 text-sm">状态更新</span>
                                    </div>
                                )}
                            </div>

                            {/* Action Buttons */}
                            <div className="flex flex-wrap gap-3">
                                <button
                                    onClick={handleFormat}
                                    disabled={!input.trim()}
                                    className="flex-1 min-w-[120px] py-3 px-6 bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 disabled:from-gray-300 disabled:to-gray-400 dark:disabled:from-gray-700 dark:disabled:to-gray-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl active:scale-95 transition-all disabled:cursor-not-allowed disabled:active:scale-100 flex items-center justify-center gap-2"
                                >
                                    <Icons.Maximize />
                                    <span>{t.format}</span>
                                </button>
                                <button
                                    onClick={handleMinify}
                                    disabled={!input.trim()}
                                    className="flex-1 min-w-[120px] py-3 px-6 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 disabled:from-gray-300 disabled:to-gray-400 dark:disabled:from-gray-700 dark:disabled:to-gray-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl active:scale-95 transition-all disabled:cursor-not-allowed disabled:active:scale-100 flex items-center justify-center gap-2"
                                >
                                    <Icons.Minimize />
                                    <span>{t.minify}</span>
                                </button>
                                <button
                                    onClick={handleCopy}
                                    disabled={!output}
                                    className="py-3 px-6 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 disabled:bg-gray-50 dark:disabled:bg-gray-900 text-gray-700 dark:text-gray-300 font-bold rounded-xl transition-all active:scale-95 disabled:cursor-not-allowed disabled:active:scale-100 flex items-center justify-center gap-2"
                                >
                                    {copied ? <Icons.Check /> : <Icons.Copy />}
                                    <span>{copied ? t.copied : t.copy}</span>
                                </button>
                                <button
                                    onClick={handleClear}
                                    className="py-3 px-6 bg-gray-100 dark:bg-gray-800 hover:bg-red-50 dark:hover:bg-red-950/20 text-gray-700 dark:text-gray-300 hover:text-red-600 dark:hover:text-red-400 font-bold rounded-xl transition-all active:scale-95 flex items-center justify-center gap-2"
                                >
                                    <Icons.Trash />
                                    <span>{t.clear}</span>
                                </button>
                            </div>

                            {/* Input/Output Grid */}
                            <div className="grid md:grid-cols-2 gap-6">
                                {/* Input */}
                                <div className="tool-card p-6 rounded-[32px] card-shadow transition-all duration-300">
                                    <div className="text-sm font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-4">{t.input_label}</div>
                                    <textarea
                                        value={input}
                                        onChange={handleInputChange}
                                        placeholder={t.input_placeholder}
                                        className="w-full h-[500px] p-4 bg-gray-50 dark:bg-gray-950/50 border border-gray-200 dark:border-gray-800 rounded-xl text-sm text-gray-700 dark:text-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-600 transition-all"
                                        spellCheck="false"
                                    />
                                </div>

                                {/* Output */}
                                <div className="tool-card p-6 rounded-[32px] card-shadow transition-all duration-300">
                                    <div className="text-sm font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-4">{t.output_label}</div>
                                    <div className="w-full h-[500px] p-4 bg-gray-50 dark:bg-gray-950/50 border border-gray-200 dark:border-gray-800 rounded-xl overflow-auto">
                                        <pre className="text-sm text-gray-700 dark:text-gray-300 whitespace-pre-wrap break-words">
                                            {output || <span className="text-gray-400 dark:text-gray-600 italic">格式化后的 JSON 将显示在这里...</span>}
                                        </pre>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="glass mt-auto py-12 px-6 border-t border-gray-100 dark:border-gray-800/50 transition-all duration-300">
                        <div className="max-w-7xl mx-auto">
                            <h3 className="font-bold mb-8 text-center text-gray-400 dark:text-gray-500 uppercase tracking-widest text-sm">{t.more_tools}</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-4">
                                {[
                                    { id: 'pwd', icon: '🔑', url: 'password.html' },
                                    { id: 'units', icon: '⚖️', url: 'units.html' },
                                    { id: 'lorem', icon: '📝', url: 'lorem.html' },
                                    { id: 'words', icon: '🔢', url: 'wordcount.html' },
                                    { id: 'text', icon: '🔀', url: 'textconvert.html' },
                                    { id: 'bmi', icon: '🏃', url: 'bmi.html' },
                                    { id: 'gradient', icon: '🎨', url: 'gradient.html' },
                                    { id: 'json', icon: '📋', url: 'json.html' }
                                ].map(item => (
                                    <a key={item.id} href={item.url} className="flex flex-col items-center p-4 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-center">
                                        <span className="text-2xl mb-2">{item.icon}</span>
                                        <span className="text-xs font-semibold text-gray-500 dark:text-gray-400">{t[item.id]}</span>
                                    </a>
                                ))}
                            </div>
                            <div className="mt-12 text-center text-gray-400 dark:text-gray-600 text-xs">
                                &copy; 2026 ToolKit.Max. All rights reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>

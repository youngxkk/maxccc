<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机文本生成器 - ToolKit.Max | 占位文本与测试数据</title>
    <meta name="description" content="ToolKit.Max 随机文本生成器，提供随机段落、姓名、邮箱等测试数据生成服务。极简设计，即开即用，适合设计师和开发者快速填充内容。">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['selector', '[data-theme="dark"]'],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        [data-theme='dark'] {
            --bg-color: #020617;
            --text-color: #f1f5f9;
            --card-bg: #1e293b;
            --nav-bg: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass {
            background: var(--nav-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .glass {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .tool-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
        };

        const translations = {
            'zh-CN': {
                title: '随机文本生成器',
                desc: '占位文本与测试数据专家',
                type_paragraph: '随机段落',
                type_name: '随机姓名',
                type_email: '随机邮箱',
                generate: '立即生成',
                copied: '已复制',
                copy: '复制',
                more_tools: '更多工具',
                pwd: '密码生成',
                units: '单位换算',
                lorem: '随机文本',
                words: '字数统计',
                text: '文本转换',
                bmi: '健康计算'
            },
            'en': {
                title: 'Lorem Ipsum Generator',
                desc: 'Placeholder text & Test data expert',
                type_paragraph: 'Paragraph',
                type_name: 'Random Name',
                type_email: 'Random Email',
                generate: 'Generate Now',
                copied: 'Copied',
                copy: 'Copy',
                more_tools: 'More Tools',
                pwd: 'Password',
                units: 'Units',
                lorem: 'Lorem Ipsum',
                words: 'Word Count',
                text: 'Text Convert',
                bmi: 'BMI Calc'
            }
        };

        const App = () => {
            const [lang, setLang] = useState(localStorage.getItem('lang') || 'zh-CN');
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'light');
            const [type, setType] = useState('paragraph');
            const [result, setResult] = useState("");
            const [copied, setCopied] = useState(false);

            const t = translations[lang];

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            }, [theme]);

            const data = {
                paragraph: [
                    "设计不仅是外观，更是产品如何运作。",
                    "极简主义不是去除多余，而是专注于核心。",
                    "好的工具应当像空气一样，需要时无处不在，平时不留痕迹。",
                    "简单是终极的复杂。",
                    "细节决定成败。",
                    "Design is not just what it looks like and feels like. Design is how it works.",
                    "Simplicity is the ultimate sophistication.",
                    "Everything is designed. Few things are designed well."
                ],
                name: ["张晓明", "李华", "王志强", "陈静", "赵敏", "James Smith", "Emma Wilson", "Liam Johnson"],
                email: ["contact@toolkit.max", "hello@example.com", "admin@web.io", "support@app.com", "dev@studio.net"]
            };

            const generate = () => {
                const list = data[type];
                setResult(list[Math.floor(Math.random() * list.length)]);
            };

            useEffect(() => generate(), [type]);

            const copyToClipboard = () => {
                navigator.clipboard.writeText(result);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen flex flex-col transition-all duration-300">
                    <nav className="glass sticky top-0 z-50 px-6 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-bold text-xl tracking-tight">
                            <span className="text-2xl">📝</span>
                            <span className="dark:text-white">ToolKit<span className="text-blue-600">.Max</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setLang(lang === 'en' ? 'zh-CN' : 'en')} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors dark:text-gray-300">
                                <Icons.Globe />
                            </button>
                            <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors dark:text-gray-300">
                                {theme === 'light' ? <Icons.Moon /> : <Icons.Sun />}
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 max-w-2xl mx-auto w-full px-6 py-12 md:py-20 animate-up">
                        <header className="text-center mb-10">
                            <h1 className="text-4xl md:text-5xl font-bold mb-4 tracking-tight dark:text-white">{t.title}</h1>
                            <p className="text-gray-500 dark:text-gray-400 text-lg">{t.desc}</p>
                        </header>

                        <div className="tool-card p-8 rounded-[32px] card-shadow transition-all duration-300">
                            <div className="space-y-6">
                                <div className="relative">
                                    <select value={type} onChange={e => setType(e.target.value)} className="w-full p-4 rounded-2xl bg-gray-50 dark:bg-gray-950/50 shadow-inner border border-gray-100 dark:border-gray-800 font-bold focus:outline-none focus:ring-2 focus:ring-blue-500/50 dark:text-gray-300 transition-all appearance-none cursor-pointer">
                                        <option value="paragraph" className="dark:bg-gray-900">{t.type_paragraph}</option>
                                        <option value="name" className="dark:bg-gray-900">{t.type_name}</option>
                                        <option value="email" className="dark:bg-gray-900">{t.type_email}</option>
                                    </select>
                                    <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6" /></svg>
                                    </div>
                                </div>

                                <div className="p-6 bg-gray-50 dark:bg-gray-950/50 border border-gray-100 dark:border-gray-800 rounded-2xl min-h-[150px] flex items-center justify-center relative group transition-all duration-300">
                                    <p className="text-lg text-gray-700 dark:text-gray-300 text-center leading-relaxed italic">{result}</p>
                                    <button onClick={copyToClipboard} className="absolute bottom-2 right-2 p-3 bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 rounded-xl hover:scale-105 active:scale-95 transition-all dark:text-gray-400">
                                        {copied ? <Icons.Check /> : <Icons.Copy />}
                                    </button>
                                </div>

                                <button onClick={generate} className="w-full py-4 bg-gray-900 dark:bg-blue-600 text-white dark:text-white font-bold rounded-2xl shadow-lg active:scale-[0.98] transition-all">
                                    {t.generate}
                                </button>
                            </div>
                        </div>
                    </main>

                    <footer className="glass mt-auto py-12 px-6 border-t border-gray-100 dark:border-gray-800/50 transition-all duration-300">
                        <div className="max-w-4xl mx-auto">
                            <h3 className="font-bold mb-8 text-center text-gray-400 dark:text-gray-500 uppercase tracking-widest text-sm">{t.more_tools}</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                                {[
                                    { id: 'pwd', icon: '🔑', url: 'password.html' },
                                    { id: 'units', icon: '⚖️', url: 'units.html' },
                                    { id: 'lorem', icon: '📝', url: 'lorem.html' },
                                    { id: 'words', icon: '🔢', url: 'wordcount.html' },
                                    { id: 'text', icon: '🔀', url: 'textconvert.html' },
                                    { id: 'bmi', icon: '🏃', url: 'bmi.html' }
                                ].map(item => (
                                    <a key={item.id} href={item.url} className="flex flex-col items-center p-4 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-center">
                                        <span className="text-2xl mb-2">{item.icon}</span>
                                        <span className="text-xs font-semibold text-gray-500 dark:text-gray-400">{t[item.id]}</span>
                                    </a>
                                ))}
                            </div>
                            <div className="mt-12 text-center text-gray-400 dark:text-gray-600 text-xs">
                                &copy; 2026 ToolKit.Max. All rights reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolKit.Max - 极简万用工具箱</title>
    <meta name="description"
        content="ToolKit.Max 是一个免费的在线工具箱，提供密码生成、单位换算、Lorem Ipsum生成、字数统计、文本转换和BMI计算等实用工具。所有计算在本地完成，保护您的隐私。">
    <meta name="keywords" content="在线工具箱, 密码生成器, 单位换算, 字数统计, BMI计算器, 文本转换, 开发者工具, 生产力工具">
    <meta property="og:type" content="website">
    <meta property="og:title" content="ToolKit.Max - 极简万用工具箱">
    <meta property="og:description" content="免费、极简、隐私安全的在线工具集合。密码生成、单位换算、字数统计等一应俱全。">
    <meta property="og:locale" content="zh_CN">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛠️</text></svg>">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body class="bg-gray-50/50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- Icons ---
        const Icons = {
            Type: (props) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="4 7 4 4 20 4 20 7" /><line x1="9" y1="20" x2="15" y2="20" /><line x1="12" y1="4" x2="12" y2="20" /></svg>,
            Replace: (props) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14 4c0-1.1.9-2 2-2" /><path d="M20 2c1.1 0 2 .9 2 2" /><path d="M22 8c0 1.1-.9 2-2 2" /><path d="M16 10c-1.1 0-2-.9-2-2" /><path d="M16 14c1.1 0 2 .9 2 2" /><path d="M22 14c0-1.1-.9-2-2-2" /><path d="M20 22c-1.1 0-2-.9-2-2" /><path d="M14 20c0 1.1 0 2 2 2" /><path d="M15 15l6 6" /><path d="M4 14v-3a8 8 0 1 1 16 0" /><path d="M4 14h6" /><path d="M4 14l3-3" /><path d="M4 14l3 3" /></svg>,
            FileText: (props) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><polyline points="10 9 9 9 8 9" /></svg>,
            Key: (props) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><circle cx="7.5" cy="15.5" r="5.5" /><path d="m21 2-9.6 9.6" /><path d="m15.5 7.5 3 3L22 7l-3-3" /></svg>,
            Scale: (props) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1z" /><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1z" /><path d="M7 21h10" /><path d="M12 3v18" /><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2" /></svg>,
            Activity: (props) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2" /></svg>,
            Copy: (props) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>,
            Check: (props) => <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}><polyline points="20 6 9 17 4 12" /></svg>,
        };

        // --- UI Components ---
        const Card = ({ children, title, description, className = "" }) => (
            <div className={`bg-white/80 backdrop-blur-xl border border-white/20 shadow-xl rounded-3xl p-6 md:p-8 transition-all duration-300 ${className}`}>
                <div className="mb-6">
                    <h2 className="text-2xl font-semibold text-gray-900 tracking-tight">{title}</h2>
                    {description && <p className="text-gray-500 mt-1 text-sm font-medium">{description}</p>}
                </div>
                {children}
            </div>
        );

        const Button = ({ onClick, children, variant = "primary", className = "", icon: Icon }) => {
            const baseStyle = "inline-flex items-center justify-center px-5 py-2.5 rounded-xl font-medium text-sm transition-all duration-200 active:scale-95 focus:outline-none focus:ring-2 focus:ring-offset-2";
            const variants = {
                primary: "bg-gray-900 text-white hover:bg-gray-800 focus:ring-gray-900 shadow-lg shadow-gray-900/20",
                secondary: "bg-gray-100 text-gray-700 hover:bg-gray-200 focus:ring-gray-200",
                accent: "bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-600 shadow-lg shadow-blue-600/20",
            };
            return (
                <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`}>
                    {Icon && <Icon className="w-4 h-4 mr-2" />}
                    {children}
                </button>
            );
        };

        const CopyButton = ({ text, simple = false }) => {
            const [copied, setCopied] = useState(false);
            const handleCopy = async () => {
                if (!text) return;
                try {
                    await navigator.clipboard.writeText(text);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    // Fallback for older browsers or if permission is denied
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    } catch (e) {
                        console.error('Copy failed', e);
                    }
                    document.body.removeChild(textArea);
                }
            };
            if (simple) return <button onClick={handleCopy} className={`text-xs px-2 py-1 rounded transition-colors ${copied ? 'text-green-600 bg-green-50' : 'text-gray-400 hover:text-gray-600'}`}>{copied ? '已复制' : '复制'}</button>;
            return <button onClick={handleCopy} className={`p-2 rounded-lg transition-colors ${copied ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{copied ? <Icons.Check className="w-4 h-4" /> : <Icons.Copy className="w-4 h-4" />}</button>;
        };

        // --- Tool Components ---
        const PasswordGenerator = () => {
            const [length, setLength] = useState(12);
            const [options, setOptions] = useState({ numbers: true, symbols: true, uppercase: true });
            const [password, setPassword] = useState("");
            const [history, setHistory] = useState([]);
            const generate = () => {
                const chars = { lower: "abcdefghijklmnopqrstuvwxyz", upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ", num: "0123456789", sym: "!@#$%^&*()_+-=[]{}|;:,.<>?" };
                let v = chars.lower; if (options.uppercase) v += chars.upper; if (options.numbers) v += chars.num; if (options.symbols) v += chars.sym;
                let p = ""; for (let i = 0; i < length; i++) p += v.charAt(Math.floor(Math.random() * v.length));
                setPassword(p); setHistory(prev => [p, ...prev].slice(0, 10));
            };
            useEffect(() => generate(), []);
            return (
                <div className="space-y-6">
                    <div className="bg-gray-50 rounded-2xl p-6 text-center relative border border-gray-100 min-h-[100px] flex items-center justify-center">
                        <span className="text-2xl md:text-3xl font-mono text-gray-800 break-all">{password}</span>
                        <div className="absolute right-4"><CopyButton text={password} /></div>
                    </div>
                    <div className="space-y-4">
                        <div className="flex justify-between text-sm font-medium"><span>长度: {length}</span></div>
                        <input type="range" min="6" max="32" value={length} onChange={(e) => setLength(parseInt(e.target.value))} className="w-full h-2 bg-gray-200 rounded-lg accent-blue-600" />
                        <div className="flex flex-wrap gap-4">
                            {Object.keys(options).map(o => (
                                <label key={o} className="flex items-center space-x-2 cursor-pointer text-sm font-medium">
                                    <input type="checkbox" checked={options[o]} onChange={() => setOptions({ ...options, [o]: !options[o] })} className="w-4 h-4 text-blue-600 rounded" />
                                    <span>{o === 'numbers' ? '数字' : o === 'symbols' ? '符号' : '大写字母'}</span>
                                </label>
                            ))}
                        </div>
                        <Button onClick={generate} variant="accent" className="w-full">重新生成</Button>
                    </div>
                </div>
            );
        };

        const UnitConverter = () => {
            const [category, setCategory] = useState('length');
            const [val, setVal] = useState(1);
            const [from, setFrom] = useState('m');
            const [to, setTo] = useState('km');
            const units = {
                length: { rates: { m: 1, km: 1000, cm: 0.01, mm: 0.001 }, labels: { m: '米', km: '千米', cm: '厘米', mm: '毫米' } },
                weight: { rates: { g: 1, kg: 1000, mg: 0.001 }, labels: { g: '克', kg: '千克', mg: '毫克' } },
                data: { rates: { B: 1, KB: 1024, MB: 1048576, GB: 1073741824 }, labels: { B: 'Byte', KB: 'KB', MB: 'MB', GB: 'GB' } }
            };
            const result = (parseFloat(val) || 0) * units[category].rates[from] / units[category].rates[to];
            return (
                <div className="space-y-6">
                    <div className="flex bg-gray-100 p-1 rounded-xl">
                        {Object.keys(units).map(k => <button key={k} onClick={() => { setCategory(k); setFrom(Object.keys(units[k].rates)[0]); setTo(Object.keys(units[k].rates)[1]); }} className={`flex-1 py-2 text-xs font-bold rounded-lg transition-all ${category === k ? 'bg-white shadow text-blue-600' : 'text-gray-500'}`}>{k === 'length' ? '长度' : k === 'weight' ? '重量' : '数据'}</button>)}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 items-center">
                        <div className="space-y-2">
                            <input type="number" value={val} onChange={e => setVal(e.target.value)} className="w-full p-3 rounded-xl bg-gray-50 border-0 focus:ring-2 focus:ring-blue-500" />
                            <select value={from} onChange={e => setFrom(e.target.value)} className="w-full bg-transparent text-sm">{Object.entries(units[category].labels).map(([k, v]) => <option key={k} value={k}>{v}</option>)}</select>
                        </div>
                        <div className="space-y-2 text-right">
                            <div className="w-full p-3 rounded-xl bg-blue-50 text-blue-700 font-bold truncate">{result.toFixed(4)}</div>
                            <select value={to} onChange={e => setTo(e.target.value)} className="w-full bg-transparent text-sm">{Object.entries(units[category].labels).map(([k, v]) => <option key={k} value={k}>{v}</option>)}</select>
                        </div>
                    </div>
                </div>
            );
        };

        const LoremGenerator = () => {
            const [type, setType] = useState('paragraph');
            const [result, setResult] = useState("");
            const data = {
                paragraph: ["设计不仅是外观，更是产品如何运作。", "极简主义不是去除多余，而是专注于核心。", "好的工具应当像空气一样，需要时无处不在，平时不留痕迹。"],
                name: ["张晓明", "李华", "王志强", "陈静"],
                email: ["contact@toolkit.max", "hello@example.com", "admin@web.io"]
            };
            const generate = () => setResult(data[type][Math.floor(Math.random() * data[type].length)]);
            return (
                <div className="space-y-4">
                    <select value={type} onChange={e => setType(e.target.value)} className="w-full p-3 rounded-xl bg-gray-50 border-0">
                        <option value="paragraph">随机段落</option>
                        <option value="name">随机姓名</option>
                        <option value="email">随机邮箱</option>
                    </select>
                    <Button onClick={generate} className="w-full">立即生成</Button>
                    {result && <div className="p-4 bg-gray-50 rounded-xl text-sm text-gray-600 border border-gray-100 flex justify-between items-center">{result} <CopyButton text={result} simple /></div>}
                </div>
            );
        };

        const WordCounter = () => {
            const [text, setText] = useState("");
            const stats = useMemo(() => ({
                total: text.length,
                cn: (text.match(/[\u4e00-\u9fa5]/g) || []).length,
                en: (text.match(/[a-zA-Z]/g) || []).length
            }), [text]);
            return (
                <div className="space-y-4">
                    <textarea value={text} onChange={e => setText(e.target.value)} placeholder="输入或粘贴文本..." className="w-full h-40 p-4 rounded-2xl bg-gray-50 border-0 focus:ring-2 focus:ring-blue-500/20 resize-none" />
                    <div className="grid grid-cols-3 gap-2 text-center">
                        <div className="p-3 bg-white border border-gray-100 rounded-xl"><div className="text-xl font-bold">{stats.total}</div><div className="text-[10px] text-gray-400 font-bold uppercase">总字数</div></div>
                        <div className="p-3 bg-white border border-gray-100 rounded-xl"><div className="text-xl font-bold">{stats.cn}</div><div className="text-[10px] text-gray-400 font-bold uppercase">中文字</div></div>
                        <div className="p-3 bg-white border border-gray-100 rounded-xl"><div className="text-xl font-bold">{stats.en}</div><div className="text-[10px] text-gray-400 font-bold uppercase">英文字</div></div>
                    </div>
                </div>
            );
        };

        const TextConverter = () => {
            const [text, setText] = useState("");
            return (
                <div className="space-y-4">
                    <textarea value={text} onChange={e => setText(e.target.value)} placeholder="输入待转换文本..." className="w-full h-32 p-4 rounded-xl bg-gray-50 border-0 focus:ring-2 focus:ring-blue-500/20 resize-none" />
                    <div className="flex flex-wrap gap-2">
                        <Button onClick={() => setText(text.toUpperCase())} variant="secondary">全大写</Button>
                        <Button onClick={() => setText(text.toLowerCase())} variant="secondary">全小写</Button>
                        <Button onClick={() => setText(text.split('').reverse().join(''))} variant="secondary">倒序</Button>
                    </div>
                </div>
            );
        };

        const BMICalculator = () => {
            const [h, setH] = useState(175);
            const [w, setW] = useState(70);
            const bmi = (w / ((h / 100) ** 2)).toFixed(1);
            return (
                <div className="space-y-6">
                    <div className="text-center py-6 bg-blue-50 rounded-2xl">
                        <div className="text-4xl font-black text-blue-600">{bmi}</div>
                        <div className="text-xs font-bold text-blue-400 uppercase tracking-widest mt-1">BMI 指数</div>
                    </div>
                    <div className="space-y-6">
                        <div className="space-y-2">
                            <div className="flex justify-between text-sm font-medium"><span>身高: {h}cm</span></div>
                            <input type="range" min="100" max="220" value={h} onChange={e => setH(e.target.value)} className="w-full h-2 bg-gray-200 rounded-lg accent-blue-600" />
                        </div>
                        <div className="space-y-2">
                            <div className="flex justify-between text-sm font-medium"><span>体重: {w}kg</span></div>
                            <input type="range" min="30" max="150" value={w} onChange={e => setW(e.target.value)} className="w-full h-2 bg-gray-200 rounded-lg accent-blue-600" />
                        </div>
                    </div>
                </div>
            );
        };

        // --- App Layout ---
        const tools = [
            { id: 'password', name: '密码生成', icon: Icons.Key, component: <PasswordGenerator />, desc: '生成高强度随机密码' },
            { id: 'units', name: '单位换算', icon: Icons.Scale, component: <UnitConverter />, desc: '长度/重量/数据单位换算' },
            { id: 'lorem', name: '占位符生成', icon: Icons.FileText, component: <LoremGenerator />, desc: '生成随机测试文本' },
            { id: 'wordCount', name: '字数统计', icon: Icons.Type, component: <WordCounter />, desc: '文本数据精细统计' },
            { id: 'converter', name: '文本转换', icon: Icons.Replace, component: <TextConverter />, desc: '大小写及特殊处理' },
            { id: 'bmi', name: '健康计算', icon: Icons.Activity, component: <BMICalculator />, desc: 'BMI 指数快速测量' }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('password');
            // tools definition moved outside
            const activeTool = tools.find(t => t.id === activeTab);

            return (
                <div className="min-h-screen flex flex-col md:flex-row">
                    <aside className="w-full md:w-72 bg-white border-r border-gray-100 p-6 flex flex-col">
                        <div className="flex items-center space-x-3 mb-10 px-2 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                            <div className="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-white">
                                <Icons.Activity className="w-6 h-6" />
                            </div>
                            <h1 className="text-xl font-bold">ToolKit<span className="text-blue-600">.Max</span></h1>
                        </div>
                        <nav className="space-y-1 flex-1">
                            {tools.map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl text-sm font-medium transition-all ${activeTab === t.id ? 'bg-gray-900 text-white shadow-lg' : 'text-gray-500 hover:bg-gray-50'}`}>
                                    <t.icon className="w-4 h-4" /> <span>{t.name}</span>
                                </button>
                            ))}
                        </nav>
                        <div className="mt-10 p-4 bg-gray-50 rounded-2xl border border-gray-100">
                            <p className="text-[10px] text-gray-400 font-bold uppercase tracking-wider mb-1">隐私说明</p>
                            <p className="text-[10px] text-gray-400 leading-relaxed">
                                所有计算均在本地完成，不会向服务器上传任何文本内容。
                            </p>
                        </div>
                    </aside>
                    <main className="flex-1 p-6 md:p-12 lg:p-20 flex flex-col items-center overflow-y-auto">
                        <div className="w-full max-w-2xl animate-fade-in-up">
                            <Card title={activeTool.name} description={activeTool.desc}>
                                {activeTool.component}
                            </Card>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - ToolKit.Max | 高强度随机密码生成</title>
    <meta name="description" content="ToolKit.Max 密码生成器，提供安全、高强度的随机密码生成服务。支持自定义长度、数字、符号和大写字母。所有操作均在本地完成，确保隐私安全。">
    <meta name="keywords" content="密码生成器, 随机密码, 安全密码, 强密码, 在线工具">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔑</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['selector', '[data-theme="dark"]'],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        [data-theme='dark'] {
            --bg-color: #020617;
            --text-color: #f1f5f9;
            --card-bg: #1e293b;
            --nav-bg: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass {
            background: var(--nav-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .glass {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .tool-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>,
            Key: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="7.5" cy="15.5" r="5.5" /><path d="m21 2-9.6 9.6" /><path d="m15.5 7.5 3 3L22 7l-3-3" /></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
        };

        const translations = {
            'zh-CN': {
                title: '密码生成器',
                desc: '生成安全、强大的随机密码',
                length: '长度',
                numbers: '数字',
                symbols: '符号',
                uppercase: '大写字母',
                generate: '重新生成',
                copied: '已复制',
                copy: '复制',
                privacy: '您的隐私很重要：所有密码均在您的设备上本地生成，永远不会发送到服务器。',
                more_tools: '更多工具',
                pwd: '密码生成',
                units: '单位换算',
                lorem: '随机文本',
                words: '字数统计',
                text: '文本转换',
                bmi: '健康计算'
            },
            'en': {
                title: 'Password Generator',
                desc: 'Generate secure and powerful random passwords',
                length: 'Length',
                numbers: 'Numbers',
                symbols: 'Symbols',
                uppercase: 'Uppercase',
                generate: 'Regenerate',
                copied: 'Copied',
                copy: 'Copy',
                privacy: 'Your privacy matters: All passwords are generated locally on your device and never sent to a server.',
                more_tools: 'More Tools',
                pwd: 'Password',
                units: 'Units',
                lorem: 'Lorem Ipsum',
                words: 'Word Count',
                text: 'Text Convert',
                bmi: 'BMI Calc'
            }
        };

        const App = () => {
            const [lang, setLang] = useState(localStorage.getItem('lang') || 'zh-CN');
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'light');
            const [length, setLength] = useState(12);
            const [options, setOptions] = useState({ numbers: true, symbols: true, uppercase: true });
            const [password, setPassword] = useState("");
            const [copied, setCopied] = useState(false);

            const t = translations[lang];

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            }, [theme]);

            const generate = () => {
                const chars = {
                    lower: "abcdefghijklmnopqrstuvwxyz",
                    upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
                    num: "0123456789",
                    sym: "!@#$%^&*()_+-=[]{}|;:,.<>?"
                };
                let v = chars.lower;
                if (options.uppercase) v += chars.upper;
                if (options.numbers) v += chars.num;
                if (options.symbols) v += chars.sym;
                let p = "";
                for (let i = 0; i < length; i++) p += v.charAt(Math.floor(Math.random() * v.length));
                setPassword(p);
            };

            useEffect(() => generate(), [length, options]);

            const copyToClipboard = () => {
                navigator.clipboard.writeText(password);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="glass sticky top-0 z-50 px-6 py-3 flex justify-between items-center transition-all duration-300">
                        <div className="flex items-center gap-2 font-bold text-xl tracking-tight">
                            <span className="text-2xl">🔑</span>
                            <span className="dark:text-white">ToolKit<span className="text-blue-600">.Max</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setLang(lang === 'en' ? 'zh-CN' : 'en')} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors dark:text-gray-300">
                                <Icons.Globe />
                            </button>
                            <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors dark:text-gray-300">
                                {theme === 'light' ? <Icons.Moon /> : <Icons.Sun />}
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 max-w-2xl mx-auto w-full px-6 py-12 md:py-20 animate-up">
                        <header className="text-center mb-10">
                            <h1 className="text-4xl md:text-5xl font-bold mb-4 tracking-tight dark:text-white">{t.title}</h1>
                            <p className="text-gray-500 dark:text-gray-400 text-lg">{t.desc}</p>
                        </header>

                        <div className="tool-card p-8 rounded-[32px] card-shadow transition-all duration-300">
                            <div className="bg-gray-50 dark:bg-gray-900/50 rounded-2xl p-6 text-center relative border border-gray-100 dark:border-gray-800/80 min-h-[120px] flex items-center justify-center mb-8">
                                <span className="text-2xl md:text-3xl font-mono text-blue-600 dark:text-blue-400 break-all px-4">{password}</span>
                                <button onClick={copyToClipboard} className="absolute top-2 right-2 p-3 bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700/50 rounded-xl hover:scale-105 active:scale-95 transition-all text-gray-500 dark:text-gray-400">
                                    {copied ? <Icons.Check /> : <Icons.Copy />}
                                </button>
                                {copied && <span className="absolute bottom-2 right-4 text-xs font-bold text-green-500">{t.copied}</span>}
                            </div>

                            <div className="space-y-8">
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center font-bold dark:text-gray-300">
                                        <span>{t.length}</span>
                                        <span className="text-blue-600 dark:text-blue-400 text-xl font-mono">{length}</span>
                                    </div>
                                    <input type="range" min="6" max="64" value={length} onChange={(e) => setLength(parseInt(e.target.value))} className="w-full h-2 bg-gray-200 dark:bg-gray-800 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    {Object.keys(options).map(key => (
                                        <label key={key} className="flex items-center justify-between p-4 rounded-2xl bg-gray-50 dark:bg-gray-900/50 border border-gray-100 dark:border-gray-800/80 cursor-pointer hover:border-blue-500 dark:hover:border-blue-400 transition-colors">
                                            <span className="font-medium dark:text-gray-300">{t[key]}</span>
                                            <input type="checkbox" checked={options[key]} onChange={() => setOptions({ ...options, [key]: !options[key] })} className="w-5 h-5 accent-blue-600 rounded" />
                                        </label>
                                    ))}
                                </div>

                                <button onClick={generate} className="w-full py-4 bg-blue-600 hover:bg-blue-700 dark:bg-blue-600 dark:hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg shadow-blue-600/20 active:scale-[0.98] transition-all">
                                    {t.generate}
                                </button>
                            </div>
                        </div>

                        <div className="mt-12 text-center px-4">
                            <p className="text-sm text-gray-400 dark:text-gray-500 leading-relaxed italic">{t.privacy}</p>
                        </div>
                    </main>

                    <footer className="glass mt-auto py-12 px-6 transition-all duration-300 border-t border-gray-100 dark:border-gray-800/50">
                        <div className="max-w-4xl mx-auto">
                            <h3 className="font-bold mb-8 text-center text-gray-400 dark:text-gray-500 uppercase tracking-widest text-sm">{t.more_tools}</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                                {[
                                    { id: 'pwd', icon: '🔑', url: 'password.html' },
                                    { id: 'units', icon: '⚖️', url: 'units.html' },
                                    { id: 'lorem', icon: '📝', url: 'lorem.html' },
                                    { id: 'words', icon: '🔢', url: 'wordcount.html' },
                                    { id: 'text', icon: '🔀', url: 'textconvert.html' },
                                    { id: 'bmi', icon: '🏃', url: 'bmi.html' }
                                ].map(item => (
                                    <a key={item.id} href={item.url} className="flex flex-col items-center p-4 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-center">
                                        <span className="text-2xl mb-2">{item.icon}</span>
                                        <span className="text-xs font-semibold text-gray-500 dark:text-gray-400">{t[item.id]}</span>
                                    </a>
                                ))}
                            </div>
                            <div className="mt-12 text-center text-gray-400 dark:text-gray-600 text-xs">
                                &copy; 2026 ToolKit.Max. All rights reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 渐变生成器 - ToolKit.Max | 可视化生成 CSS 渐变代码</title>
    <meta name="description" content="ToolKit.Max CSS 渐变生成器，可视化生成线性渐变和径向渐变代码。支持多色渐变、角度调整、实时预览，一键复制 CSS 代码。">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎨</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['selector', '[data-theme="dark"]'],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --card-bg: #ffffff;
            --nav-bg: rgba(255, 255, 255, 0.8);
        }

        [data-theme='dark'] {
            --bg-color: #020617;
            --text-color: #f1f5f9;
            --card-bg: #1e293b;
            --nav-bg: rgba(15, 23, 42, 0.8);
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .glass {
            background: var(--nav-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .glass {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        [data-theme='dark'] .tool-card {
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        input[type="color"] {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 50px;
            height: 50px;
            background-color: transparent;
            border: none;
            cursor: pointer;
        }

        input[type="color"]::-webkit-color-swatch {
            border-radius: 12px;
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        input[type="color"]::-moz-color-swatch {
            border-radius: 12px;
            border: 2px solid rgba(0, 0, 0, 0.1);
        }

        [data-theme='dark'] input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        [data-theme='dark'] input[type="color"]::-moz-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" /></svg>,
            Moon: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>,
            Globe: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></svg>,
            Check: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /></svg>,
            Shuffle: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 3h5v5" /><path d="M4 20L21 3" /><path d="M21 16v5h-5" /><path d="M15 15l6 6" /><path d="M4 4l5 5" /></svg>
        };

        // Apple-inspired gradient presets
        const appleGradients = [
            // iOS 7+ Classic Gradients
            { colors: [{ color: '#667eea', position: 0 }, { color: '#764ba2', position: 100 }], angle: 135 }, // Purple Dream
            { colors: [{ color: '#f093fb', position: 0 }, { color: '#f5576c', position: 100 }], angle: 135 }, // Pink Sunset
            { colors: [{ color: '#4facfe', position: 0 }, { color: '#00f2fe', position: 100 }], angle: 135 }, // Sky Blue
            { colors: [{ color: '#43e97b', position: 0 }, { color: '#38f9d7', position: 100 }], angle: 135 }, // Fresh Green
            { colors: [{ color: '#fa709a', position: 0 }, { color: '#fee140', position: 100 }], angle: 135 }, // Warm Sunset

            // macOS Big Sur Wallpaper Inspired
            { colors: [{ color: '#ee0979', position: 0 }, { color: '#ff6a00', position: 100 }], angle: 120 }, // Fire
            { colors: [{ color: '#f857a6', position: 0 }, { color: '#ff5858', position: 100 }], angle: 135 }, // Rose
            { colors: [{ color: '#a8edea', position: 0 }, { color: '#fed6e3', position: 100 }], angle: 135 }, // Pastel Dream
            { colors: [{ color: '#ff9a9e', position: 0 }, { color: '#fecfef', position: 50 }, { color: '#fecfef', position: 100 }], angle: 120 }, // Cotton Candy

            // Modern iOS Gradients
            { colors: [{ color: '#30cfd0', position: 0 }, { color: '#330867', position: 100 }], angle: 135 }, // Deep Ocean
            { colors: [{ color: '#a1c4fd', position: 0 }, { color: '#c2e9fb', position: 100 }], angle: 135 }, // Light Blue
            { colors: [{ color: '#ffecd2', position: 0 }, { color: '#fcb69f', position: 100 }], angle: 135 }, // Peach
            { colors: [{ color: '#ff6e7f', position: 0 }, { color: '#bfe9ff', position: 100 }], angle: 135 }, // Cherry Blossom
            { colors: [{ color: '#e0c3fc', position: 0 }, { color: '#8ec5fc', position: 100 }], angle: 135 }, // Lavender Sky

            // Vibrant Apple Watch Faces
            { colors: [{ color: '#f83600', position: 0 }, { color: '#f9d423', position: 100 }], angle: 45 }, // Sunset Orange
            { colors: [{ color: '#0fd850', position: 0 }, { color: '#f9f047', position: 100 }], angle: 135 }, // Neon Lime
            { colors: [{ color: '#00d2ff', position: 0 }, { color: '#3a47d5', position: 100 }], angle: 135 }, // Electric Blue
            { colors: [{ color: '#fe8c00', position: 0 }, { color: '#f83600', position: 100 }], angle: 135 }, // Tangerine

            // Elegant & Subtle
            { colors: [{ color: '#d299c2', position: 0 }, { color: '#fef9d7', position: 100 }], angle: 135 }, // Soft Pink
            { colors: [{ color: '#fddb92', position: 0 }, { color: '#d1fdff', position: 100 }], angle: 135 }, // Morning Light
            { colors: [{ color: '#9890e3', position: 0 }, { color: '#b1f4cf', position: 100 }], angle: 135 }, // Mint Purple
            { colors: [{ color: '#ebc0fd', position: 0 }, { color: '#d9ded8', position: 100 }], angle: 135 }, // Misty Lavender

            // Bold & Dynamic
            { colors: [{ color: '#ff0844', position: 0 }, { color: '#ffb199', position: 100 }], angle: 135 }, // Hot Pink
            { colors: [{ color: '#00c6ff', position: 0 }, { color: '#0072ff', position: 100 }], angle: 135 }, // Ocean Blue
            { colors: [{ color: '#f2709c', position: 0 }, { color: '#ff9472', position: 100 }], angle: 135 }, // Coral Reef
        ];

        const translations = {
            'zh-CN': {
                title: 'CSS 渐变生成器',
                desc: '可视化生成精美的 CSS 渐变代码',
                angle: '角度',
                add_color: '添加颜色',
                random_gradient: '随机渐变',
                copy_code: '复制代码',
                copied: '已复制',
                preview: '预览',
                css_code: 'CSS 代码',
                more_tools: '更多工具',
                pwd: '密码生成',
                units: '单位换算',
                lorem: '随机文本',
                words: '字数统计',
                text: '文本转换',
                bmi: '健康计算',
                gradient: 'CSS 渐变'
            },
            'en': {
                title: 'CSS Gradient Generator',
                desc: 'Visually create beautiful CSS gradients',
                angle: 'Angle',
                add_color: 'Add Color',
                random_gradient: 'Random',
                copy_code: 'Copy Code',
                copied: 'Copied',
                preview: 'Preview',
                css_code: 'CSS Code',
                more_tools: 'More Tools',
                pwd: 'Password',
                units: 'Units',
                lorem: 'Lorem Ipsum',
                words: 'Word Count',
                text: 'Text Convert',
                bmi: 'BMI Calc',
                gradient: 'CSS Gradient'
            }
        };

        const App = () => {
            const [lang, setLang] = useState(localStorage.getItem('lang') || 'zh-CN');
            const [theme, setTheme] = useState(localStorage.getItem('theme') || 'light');
            const [angle, setAngle] = useState(135);
            const [colors, setColors] = useState([
                { color: '#667eea', position: 0 },
                { color: '#764ba2', position: 100 }
            ]);
            const [copied, setCopied] = useState(false);

            const t = translations[lang];

            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            }, [theme]);

            const generateGradient = () => {
                const colorStops = colors
                    .sort((a, b) => a.position - b.position)
                    .map(c => `${c.color} ${c.position}%`)
                    .join(', ');

                return `linear-gradient(${angle}deg, ${colorStops})`;
            };

            const addColor = () => {
                if (colors.length < 5) {
                    setColors([...colors, { color: '#ff6b6b', position: 50 }]);
                }
            };

            const removeColor = (index) => {
                if (colors.length > 2) {
                    setColors(colors.filter((_, i) => i !== index));
                }
            };

            const updateColor = (index, field, value) => {
                const newColors = [...colors];
                newColors[index][field] = value;
                setColors(newColors);
            };

            const copyToClipboard = () => {
                const cssCode = `background: ${generateGradient()};`;
                navigator.clipboard.writeText(cssCode);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            // Random gradient generator - picks from Apple-inspired presets
            const randomGradient = () => {
                const randomIndex = Math.floor(Math.random() * appleGradients.length);
                const selectedGradient = appleGradients[randomIndex];

                setAngle(selectedGradient.angle);
                setColors(selectedGradient.colors);
            };

            const gradient = generateGradient();

            return (
                <div className="min-h-screen flex flex-col transition-all duration-300">
                    <nav className="glass sticky top-0 z-50 px-6 py-3 flex justify-between items-center">
                        <div className="flex items-center gap-2 font-bold text-xl tracking-tight">
                            <span className="text-2xl">🎨</span>
                            <span className="dark:text-white">ToolKit<span className="text-blue-600">.Max</span></span>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={() => setLang(lang === 'en' ? 'zh-CN' : 'en')} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors dark:text-gray-300">
                                <Icons.Globe />
                            </button>
                            <button onClick={() => setTheme(theme === 'light' ? 'dark' : 'light')} className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-colors dark:text-gray-300">
                                {theme === 'light' ? <Icons.Moon /> : <Icons.Sun />}
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1 max-w-4xl mx-auto w-full px-6 py-12 md:py-20 animate-up">
                        <header className="text-center mb-10">
                            <h1 className="text-4xl md:text-5xl font-bold mb-4 tracking-tight dark:text-white">{t.title}</h1>
                            <p className="text-gray-500 dark:text-gray-400 text-lg">{t.desc}</p>
                        </header>

                        <div className="space-y-6">
                            {/* Preview */}
                            <div className="tool-card p-8 rounded-[32px] card-shadow transition-all duration-300">
                                <div className="flex justify-between items-center mb-4">
                                    <div className="text-sm font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">{t.preview}</div>
                                    <button
                                        onClick={randomGradient}
                                        className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl active:scale-95 transition-all"
                                    >
                                        <Icons.Shuffle />
                                        {t.random_gradient}
                                    </button>
                                </div>
                                <div
                                    className="w-full h-64 rounded-2xl shadow-inner transition-all duration-500"
                                    style={{ background: gradient }}
                                ></div>
                            </div>

                            {/* Controls */}
                            <div className="tool-card p-8 rounded-[32px] card-shadow transition-all duration-300">
                                <div className="space-y-6">
                                    {/* Angle */}
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center">
                                            <span className="font-bold dark:text-gray-300">{t.angle}</span>
                                            <span className="text-blue-600 dark:text-blue-400 font-mono font-bold">{angle}°</span>
                                        </div>
                                        <input
                                            type="range"
                                            min="0"
                                            max="360"
                                            value={angle}
                                            onChange={(e) => setAngle(e.target.value)}
                                            className="w-full h-2 bg-gray-200 dark:bg-gray-800 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                        />
                                    </div>

                                    {/* Colors */}
                                    <div className="space-y-4">
                                        {colors.map((colorStop, index) => (
                                            <div key={index} className="flex items-center gap-4 p-4 bg-gray-50 dark:bg-gray-950/50 rounded-xl border border-gray-100 dark:border-gray-800">
                                                <input
                                                    type="color"
                                                    value={colorStop.color}
                                                    onChange={(e) => updateColor(index, 'color', e.target.value)}
                                                />
                                                <div className="flex-1 space-y-2">
                                                    <div className="flex justify-between items-center text-sm">
                                                        <span className="font-mono font-bold text-gray-700 dark:text-gray-300">{colorStop.color}</span>
                                                        <span className="text-blue-600 dark:text-blue-400 font-mono font-bold">{colorStop.position}%</span>
                                                    </div>
                                                    <input
                                                        type="range"
                                                        min="0"
                                                        max="100"
                                                        value={colorStop.position}
                                                        onChange={(e) => updateColor(index, 'position', parseInt(e.target.value))}
                                                        className="w-full h-1.5 bg-gray-200 dark:bg-gray-800 rounded-lg appearance-none cursor-pointer accent-blue-600"
                                                    />
                                                </div>
                                                {colors.length > 2 && (
                                                    <button
                                                        onClick={() => removeColor(index)}
                                                        className="p-2 hover:bg-red-50 dark:hover:bg-red-900/20 text-red-500 rounded-lg transition-colors"
                                                    >
                                                        <Icons.Trash />
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                    </div>

                                    {/* Add Color Button */}
                                    {colors.length < 5 && (
                                        <button
                                            onClick={addColor}
                                            className="w-full py-3 px-4 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 font-bold rounded-xl transition-all flex items-center justify-center gap-2"
                                        >
                                            <Icons.Plus />
                                            {t.add_color}
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* CSS Code */}
                            <div className="tool-card p-8 rounded-[32px] card-shadow transition-all duration-300">
                                <div className="space-y-4">
                                    <div className="text-sm font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">{t.css_code}</div>
                                    <div className="relative">
                                        <pre className="p-4 bg-gray-50 dark:bg-gray-950/50 border border-gray-100 dark:border-gray-800 rounded-xl overflow-x-auto">
                                            <code className="text-sm font-mono text-gray-700 dark:text-gray-300">background: {gradient};</code>
                                        </pre>
                                        <button
                                            onClick={copyToClipboard}
                                            className="absolute top-2 right-2 p-3 bg-white dark:bg-gray-800 shadow-sm border border-gray-100 dark:border-gray-700 rounded-xl hover:scale-105 active:scale-95 transition-all dark:text-gray-400"
                                        >
                                            {copied ? <Icons.Check /> : <Icons.Copy />}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    <footer className="glass mt-auto py-12 px-6 border-t border-gray-100 dark:border-gray-800/50 transition-all duration-300">
                        <div className="max-w-4xl mx-auto">
                            <h3 className="font-bold mb-8 text-center text-gray-400 dark:text-gray-500 uppercase tracking-widest text-sm">{t.more_tools}</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-4">
                                {[
                                    { id: 'pwd', icon: '🔑', url: 'password.html' },
                                    { id: 'units', icon: '⚖️', url: 'units.html' },
                                    { id: 'lorem', icon: '📝', url: 'lorem.html' },
                                    { id: 'words', icon: '🔢', url: 'wordcount.html' },
                                    { id: 'text', icon: '🔀', url: 'textconvert.html' },
                                    { id: 'bmi', icon: '🏃', url: 'bmi.html' },
                                    { id: 'gradient', icon: '🎨', url: 'gradient.html' }
                                ].map(item => (
                                    <a key={item.id} href={item.url} className="flex flex-col items-center p-4 rounded-2xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-center">
                                        <span className="text-2xl mb-2">{item.icon}</span>
                                        <span className="text-xs font-semibold text-gray-500 dark:text-gray-400">{t[item.id]}</span>
                                    </a>
                                ))}
                            </div>
                            <div className="mt-12 text-center text-gray-400 dark:text-gray-600 text-xs">
                                &copy; 2026 ToolKit.Max. All rights reserved.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>

</html>
